<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Chat</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-animation">
    <div class="grid-lines"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>
  
  <div class="chat-container">
    <header class="chat-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">NEURAL CHAT</span>
      </div>
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span class="status-text">ONLINE</span>
      </div>
    </header>
    
    <div id="chat-box">
      <div class="welcome-message">
        <div class="welcome-icon">⬡</div>
        <p>Welcome to Neural Chat</p>
        <span>Ask me anything...</span>
      </div>
    </div>
    
    <div class="input-container">
      <div class="input-wrapper">
        <textarea id="user-input" placeholder="Type your message..." rows="1"></textarea>
        <div class="char-count"><span id="char-num">0</span>/500</div>
      </div>
      <button id="send-btn">
        <span class="btn-text">SEND</span>
        <span class="btn-icon">➤</span>
      </button>
    </div>
    
    <div class="keyboard-hint">
      <kbd>Enter</kbd> send · <kbd>Shift + Enter</kbd> new line
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
